<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入场 · 个人博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #121212;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            perspective: 1200px;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .wrap {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .sphere {
            width: 100vmax;
            height: 100vmax;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(23.5deg);
            transform-style: preserve-3d;
            z-index: 1;
            will-change: transform;
            backface-visibility: hidden;
        }

        .line-h,
        .line-v {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .line-v {
            animation: spin 28s linear infinite reverse;
            will-change: transform;
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vmax;
            height: 100vmax;
            border: 1px solid #3ecf8e;
            border-radius: 50%;
            opacity: 0.65;
            transform-origin: center center;
            transform: translate(-50%, -50%);
            image-rendering: crisp-edges;
        }

        /* 完整9条纬线（你要的加回足量线条） */
        .h1 { transform: translate(-50%,-50%) rotateX(90deg); }
        .h2 { transform: translate(-50%,-50%) rotateX(67.5deg); }
        .h3 { transform: translate(-50%,-50%) rotateX(45deg); }
        .h4 { transform: translate(-50%,-50%) rotateX(22.5deg); }
        .h5 { transform: translate(-50%,-50%) rotateX(0deg); }
        .h6 { transform: translate(-50%,-50%) rotateX(-22.5deg); }
        .h7 { transform: translate(-50%,-50%) rotateX(-45deg); }
        .h8 { transform: translate(-50%,-50%) rotateX(-67.5deg); }
        .h9 { transform: translate(-50%,-50%) rotateX(-90deg); }

        /* 12条完整经线 密集立体 */
        .v1  { transform: translate(-50%,-50%) rotateY(0deg); }
        .v2  { transform: translate(-50%,-50%) rotateY(30deg); }
        .v3  { transform: translate(-50%,-50%) rotateY(60deg); }
        .v4  { transform: translate(-50%,-50%) rotateY(90deg); }
        .v5  { transform: translate(-50%,-50%) rotateY(120deg); }
        .v6  { transform: translate(-50%,-50%) rotateY(150deg); }
        .v7  { transform: translate(-50%,-50%) rotateY(180deg); }
        .v8  { transform: translate(-50%,-50%) rotateY(210deg); }
        .v9  { transform: translate(-50%,-50%) rotateY(240deg); }
        .v10 { transform: translate(-50%,-50%) rotateY(270deg); }
        .v11 { transform: translate(-50%,-50%) rotateY(300deg); }
        .v12 { transform: translate(-50%,-50%) rotateY(330deg); }

        @keyframes spin {
            0%   { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .text-group {
            position: relative;
            z-index: 99;
            text-align: center;
            backface-visibility: hidden;
        }

        .title {
            font-size: 2.2rem;
            letter-spacing: 6px;
            color: #ffffff;
            text-align: center;
        }
        .desc {
            color: #a0a0a0;
            margin-top: 0.8rem;
            font-size: 1rem;
        }
        .enter-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 12px 36px;
            background: #3ecf8e;
            color: #121212;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s ease;
            text-decoration: none;
        }
        .enter-btn:hover {
            background: #4fe09c;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="sphere">
            <!-- 全部9条纬线 完整加回 -->
            <div class="line-h">
                <div class="ring h1"></div>
                <div class="ring h2"></div>
                <div class="ring h3"></div>
                <div class="ring h4"></div>
                <div class="ring h5"></div>
                <div class="ring h6"></div>
                <div class="ring h7"></div>
                <div class="ring h8"></div>
                <div class="ring h9"></div>
            </div>
            <!-- 全部12条经线 密集环绕 -->
            <div class="line-v">
                <div class="ring v1"></div>
                <div class="ring v2"></div>
                <div class="ring v3"></div>
                <div class="ring v4"></div>
                <div class="ring v5"></div>
                <div class="ring v6"></div>
                <div class="ring v7"></div>
                <div class="ring v8"></div>
                <div class="ring v9"></div>
                <div class="ring v10"></div>
                <div class="ring v11"></div>
                <div class="ring v12"></div>
            </div>
        </div>

        <div class="text-group">
            <h1 class="title">个人技术博客</h1>
            <p class="desc">以线条构筑世界 · 以代码记录成长</p >
            <a href="Untitled-2.html"class="enter-btn">进入主页</ a>
        </div>
    </div>
</body>
</html>
